<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <!-- Top Area -->
        <img class="logo" src="static/logo.png">
        <img class="round-area" src="static/bracket-title/f-border.png">
        <img class="round-name" src="static/bracket-title/f.png">
        
        <!-- Player Left -->
        <div class="player-container player-left-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-left-name">rumii</div>
            <div class="player-line-2 player-left-line-2">
                <div class="player-seed">#32</div>
                <div class="player-star-container player-left-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-left-line"></div>
            <div class="player-hits player-left-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-left-hit-count-container">
                    <div>10</div>
                    <div>4</div>
                    <div>1</div>
                </div>
            </div>
        </div>

        <!-- Score Number Left -->
        <div class="score-number score-left-number">
            <img src="static/score-numbers/score-1.png">
            <img src="static/score-numbers/score-2.png">
            <img src="static/score-numbers/score-3.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-4.png">
            <img src="static/score-numbers/score-5.png">
            <img src="static/score-numbers/score-6.png">
        </div>

        <!-- Score Bar -->
        <div class="score-bar">
            <div class="score-bar-background"></div>
            <div class="score-bar-overlay score-left-bar"></div>
            <div class="score-bar-overlay score-right-bar"></div>
        </div>

        <!-- Score Difference -->
        <div class="score-difference score-left-difference">+<span>34,567</span></div>
        <div class="score-difference score-right-difference">+<span>34,567</span></div>

        <!-- Score Number Right -->
        <div class="score-number score-right-number">
            <img src="static/score-numbers/score-1.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-2.png">
            <img src="static/score-numbers/score-3.png">
            <img src="static/score-numbers/score-4.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-5.png">
            <img src="static/score-numbers/score-6.png">
            <img src="static/score-numbers/score-7.png">
        </div>

        <!-- Now Playing Panel -->
        <div class="now-playing-panel now-playing-panel-left-pick">
            <div class="now-playing-panel-overlay"></div>
            <div class="now-playing-metadata now-playing-song-title">SONG-TITLESONG-TITLESONG-TITLESONG-TITLE</div>
            <div class="now-playing-metadata now-playing-artist">ARTIST</div>
            <div class="now-playing-mapper-difficulty">
                <div class="now-playing-mapper">mapped by <span>MAPPER</span></div>
                <div class="now-playing-difficulty">[a very long difficulty name that cannot be named]</div>
            </div>
        </div>

        <!-- Player Right -->
        <div class="player-container player-right-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-right-name">rumii</div>
            <div class="player-line-2 player-right-line-2">
                <div class="player-seed">#32</div>
                <div class="player-star-container player-right-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-right-line"></div>
            <div class="player-hits player-right-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-right-hit-count-container">
                    <div>10</div>
                    <div>4</div>
                    <div>1</div>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
