<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <!-- Top Area -->
        <img class="logo" src="static/logo.png">
        <img class="round-area" src="static/round-rectangle.png">
        <div class="round-area round-name">ROUND 16</div>
        
        <!-- Player Left -->
        <div class="player-container player-left-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-left-name">rumii</div>
            <div class="player-line-2 player-left-line-2">
                <div class="player-seed">#32</div>
                <div class="player-star-container player-left-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-left-line"></div>
            <div class="player-hits player-left-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-left-hit-count-container">
                    <div>10</div>
                    <div>4</div>
                    <div>1</div>
                </div>
            </div>
        </div>


        <!-- Player Right -->
        <div class="player-container player-right-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-right-name">rumii</div>
            <div class="player-line-2 player-right-line-2">
                <div class="player-seed">#32</div>
                <div class="player-star-container player-right-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-right-line"></div>
            <div class="player-hits player-right-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-right-hit-count-container">
                    <div>10</div>
                    <div>4</div>
                    <div>1</div>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
