<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="../_shared/deps/reconnecting-websocket.min.js"></script>
    <script src="../_shared/deps/countUp.js"></script>
    <script src="../_shared/deps/countUpImage.js"></script>
</head>
<body>
    <div class="main">
        <!-- Top Area -->
        <img class="logo" src="static/logo.png">
        <img class="round-area" id="round-area">
        <img class="round-name" id="round-name">
        
        <!-- Player Left -->
        <div class="player-container player-left-container">
            <div class="player-profile-picture" id="player-left-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-left-name" id="player-left-name">rumii</div>
            <div class="player-line-2 player-left-line-2" id="player-left-line-2">
                <div class="player-seed" id="player-left-seed">#32</div>
                <div class="player-star-container player-left-star-container" id="player-left-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-left-line" id="player-left-line"></div>
            <div class="player-hits player-left-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-left-hit-count-container">
                    <div id="player-left-hit-number-100">10</div>
                    <div id="player-left-hit-number-50">4</div>
                    <div id="player-left-hit-number-miss">1</div>
                </div>
            </div>
        </div>

        <!-- Score Number Left -->
        <div class="score-number score-left-number" id="score-left-number">
            <img src="static/score-numbers/score-1.png">
            <img src="static/score-numbers/score-2.png">
            <img src="static/score-numbers/score-3.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-4.png">
            <img src="static/score-numbers/score-5.png">
            <img src="static/score-numbers/score-6.png">
        </div>

        <!-- Score Bar -->
        <div class="score-bar" id="score-bar">
            <div class="score-bar-background"></div>
            <div class="score-bar-overlay score-left-bar"></div>
            <div class="score-bar-overlay score-right-bar"></div>
        </div>

        <!-- Score Difference -->
        <div class="score-difference score-left-difference" id="score-left-difference">+<span id="score-left-difference-number">34,567</span></div>
        <div class="score-difference score-right-difference" id="score-right-difference">+<span id="score-right-difference-number">34,567</span></div>

        <!-- Score Number Right -->
        <div class="score-number score-right-number" id="score-right-number">
            <img src="static/score-numbers/score-1.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-2.png">
            <img src="static/score-numbers/score-3.png">
            <img src="static/score-numbers/score-4.png">
            <img src="static/score-numbers/score-comma.png">
            <img src="static/score-numbers/score-5.png">
            <img src="static/score-numbers/score-6.png">
            <img src="static/score-numbers/score-7.png">
        </div>

        <!-- Now Playing Panel -->
        <div class="now-playing-panel now-playing-panel-left-pick" id="now-playing-panel">
            <div class="now-playing-panel-overlay"></div>
            <div class="now-playing-metadata now-playing-song-title">SONG-TITLESONG-TITLESONG-TITLESONG-TITLE</div>
            <div class="now-playing-metadata now-playing-artist">ARTIST</div>
            <div class="now-playing-mapper-difficulty">
                <div class="now-playing-mapper">mapped by <span>MAPPER</span></div>
                <div class="now-playing-difficulty">[a very long difficulty name that cannot be named]</div>
            </div>
            <div class="now-playing-stats">
                <div class="now-playing-individual-stat">
                    <div class="now-playing-stat-text now-playing-stat-text-cs">CS</div>
                    <div class="now-playing-stat-text now-playing-stat-number">5.0</div>
                </div>
                <div class="now-playing-individual-stat">
                    <div class="now-playing-stat-text now-playing-stat-text-ar">AR</div>
                    <div class="now-playing-stat-text now-playing-stat-number">9.3</div>
                </div>
                <div class="now-playing-individual-stat">
                    <div class="now-playing-stat-text now-playing-stat-text-od">OD</div>
                    <div class="now-playing-stat-text now-playing-stat-number">8.5</div>
                </div>
                <div class="now-playing-individual-stat">
                    <div class="now-playing-stat-text now-playing-stat-text-sr">SR</div>
                    <div class="now-playing-stat-text now-playing-stat-number">6.21</div>
                </div>
            </div>
            <div class="now-playing-bottom-stats">
                <div class="now-playing-bottom-time">2:34 / 5:43</div>
                <div class="now-playing-bottom-pipe">|</div>
                <div class="now-playing-bottom-bpm">
                    <div class="now-playing-bottom-bpm-number">138</div>
                    <div class="now-playing-bottom-bpm-text">BPM</div>
                </div>
            </div>
        </div>

        <!-- Player Right -->
        <div class="player-container player-right-container">
            <div class="player-profile-picture" id="player-right-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-right-name" id="player-right-name">rumii</div>
            <div class="player-line-2 player-right-line-2" id="player-right-line-2">
                <div class="player-seed" id="player-right-seed">#32</div>
                <div class="player-star-container player-right-star-container" id="player-right-star-container">
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-fill.png"></div>
                    <div class="player-star"><img src="static/point/point-empty.png"></div>
                </div>
            </div>
            <div class="player-line player-right-line" id="player-right-line"></div>
            <div class="player-hits player-right-hits">
                <div class="player-hit-number-container">
                    <div class="player-hit-number-100">100</div>
                    <div class="player-hit-number-50">50</div>
                    <div class="player-hit-number-miss">MISS</div>
                </div>
                <div class="player-hit-count-container player-right-hit-count-container">
                    <div id="player-right-hit-number-100">10</div>
                    <div id="player-right-hit-number-50">4</div>
                    <div id="player-right-hit-number-miss">1</div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
