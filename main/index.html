<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <!-- Top Area -->
        <img class="logo" src="static/logo.png">
        <img class="round-area" src="static/round-rectangle.png">
        <div class="round-area round-name">ROUND 16</div>
        
        <!-- Player Left -->
        <div class="player-container player-left-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-left-name">rumii</div>
        </div>


        <!-- Player Right -->
        <div class="player-container player-right-container">
            <div class="player-profile-picture">
                <img src="static/profile-picture/avatar-glass-layer-1.png">
                <img src="static/profile-picture/avatar-glass-layer-2.png">
            </div>
            <div class="player-name player-right-name">rumii</div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
